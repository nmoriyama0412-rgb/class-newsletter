<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学級通信メーカー</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter & Noto Sans JP (UI) & Noto Serif JP (News) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 左サイドパネル（入力・操作エリア） -->
        <aside class="control-panel no-print">
            <header>
                <h1>学級通信メーカー</h1>
                <p>メモと写真で半自動作成</p>
            </header>

            <section class="basic-info-section">
                <h2>基本情報</h2>
                <div class="input-group row">
                    <div class="field">
                        <label for="newsletter-title">タイトル</label>
                        <input type="text" id="newsletter-title" value="学級通信" placeholder="例: 飛躍, スマイル等">
                    </div>
                    <div class="field">
                        <label for="newsletter-issue">号数</label>
                        <input type="text" id="newsletter-issue" value="第1号" placeholder="例: 第1号">
                    </div>
                </div>
                <div class="input-group row">
                    <div class="field">
                        <label for="newsletter-date">発行日</label>
                        <input type="date" id="newsletter-date">
                    </div>
                    <div class="field">
                        <label for="newsletter-publisher">発行者</label>
                        <input type="text" id="newsletter-publisher" value="〇〇中学校 3年1組" placeholder="例: 〇〇中学校 3年1組">
                    </div>
                </div>
            </section>

            <section class="memo-section">
                <h2>AI用メモ入力</h2>
                <p class="hint">箇条書きで記入してください</p>
                <div class="input-group">
                    <label for="memo-events">今日の出来事</label>
                    <textarea id="memo-events" rows="2" placeholder="例: 学活で係活動の振り返りをした"></textarea>
                </div>
                <div class="input-group">
                    <label for="memo-good">生徒のよかった姿</label>
                    <textarea id="memo-good" rows="2" placeholder="例: 友達の意見を最後まで聞く姿が見られた"></textarea>
                </div>
                <div class="input-group">
                    <label for="memo-message">伝えたいこと</label>
                    <textarea id="memo-message" rows="2" placeholder="例: 少しずつ自分たちで動ける雰囲気が出てきた"></textarea>
                </div>
                <div class="input-group">
                    <label for="memo-notes">連絡事項</label>
                    <textarea id="memo-notes" rows="2" placeholder="例: 明日は体操服登校"></textarea>
                </div>
                <button id="generate-prompt-btn" class="primary-btn">AI用指示文をコピー</button>
            </section>

            <section class="ai-result-section">
                <h2>AI生成文章の貼り付け</h2>
                <div class="input-group">
                    <textarea id="ai-result-text" rows="6" placeholder="ChatGPT/Geminiで生成された文章をここに貼り付けてください"></textarea>
                </div>
            </section>

            <section class="photo-section">
                <h2>写真の追加 (最大5枚)</h2>
                <input type="file" id="photo-upload" accept="image/*" multiple max="5">
                <div id="photo-file-names" class="file-names"></div>
            </section>

            <div class="actions">
                <button id="preview-pdf-btn" class="success-btn">安全チェック＆PDF保存</button>
            </div>
        </aside>

        <!-- 右メインパネル（A4プレビュー領域） -->
        <main class="preview-panel">
            <div class="a4-page" id="a4-preview">
                <!-- ヘッダー（新聞風） -->
                <div class="newspaper-header" id="newspaper-header">
                    <div class="header-info">
                        <div class="date">
                            <span id="preview-date">2026年3月12日</span>
                            <span id="season-icon" class="season-icon"></span>
                        </div>
                        <div class="issue-info">
                            <span id="preview-issue">第1号</span>
                        </div>
                        <div class="publisher-info">
                            <span id="preview-publisher" class="newspaper-publisher">発行者：〇〇中学校 3年1組</span>
                        </div>
                    </div>
                    <div class="header-right">
                        <div class="a4-title-wrapper">
                            <div class="a4-title" id="preview-title">学級通信</div>
                        </div>
                    </div>
                </div>
                
                <!-- 大見出し -->
                <div class="main-headline-wrapper">
                    <h1 id="preview-main-headline" class="main-headline">見出し</h1>
                </div>

                <!-- コンテンツエリア（写真・縦見出し・本文・連絡網） -->
                <div class="newspaper-content-area">
                    <!-- 上段：写真・縦見出し -->
                    <div class="top-section">
                        <!-- 写真・イラスト領域 -->
                        <div class="media-area layout-1" id="preview-photos">
                            <!-- デフォルトはグレー背景など -->
                        </div>
                        <!-- 縦長の小見出し -->
                        <div class="sub-headline-wrapper vertical-text">
                            <h2 id="preview-sub-headline" class="sub-headline">見出し<br>見出し</h2>
                        </div>
                    </div>

                    <!-- 下段：本文（縦書き多段組み）と連絡事項 -->
                    <div class="bottom-section">
                        <div class="article-body vertical-text" id="preview-body-container">
                            <span id="preview-body-text">ここに文章が表示されます。左側の「AI生成文章の貼り付け」にテキストを入力してください。</span>
                            
                            <!-- 連絡事項 -->
                            <div class="notes-section" id="notes-container">
                                <div class="notes-title">【連絡等】</div>
                                <div id="preview-notes" class="notes-body">
                                    明日は体操服登校
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 安全チェックモーダル -->
    <div id="checklist-modal" class="modal hidden no-print">
        <div class="modal-content">
            <h2>印刷（PDF保存）前の安全チェック</h2>
            <p>以下の項目をすべて確認し、チェックを入れてください。</p>
            <form id="checklist-form">
                <label class="check-item"><input type="checkbox" required> 生徒名が入っていないか確認した。</label>
                <label class="check-item"><input type="checkbox" required> 個人が特定されるような写真になっていないか確認した。</label>
                <label class="check-item"><input type="checkbox" required> 写真に名札や名簿が写っていないか確認した。</label>
                <label class="check-item"><input type="checkbox" required> 黒板や掲示物に個人情報がないか確認した。</label>
                <label class="check-item"><input type="checkbox" required> トラブルが特定されるような表現になっていないか確認した。</label>
            </form>
            <div class="modal-actions">
                <button id="cancel-modal-btn" class="secondary-btn">キャンセル</button>
                <button id="confirm-print-btn" class="primary-btn" disabled>PDFとして保存する</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
